<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Dashboard - Quản lý nhân sự</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar,
        .sidebar,
        .card,
        footer {
            background-color: #0a0a0a !important;
        }

        .navbar {
            border-bottom: 1px solid #333;
        }

        .sidebar {
            border-right: 1px solid #333;
            min-height: calc(100vh - 56px);
        }

        .nav-link {
            color: #ccc;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 4px 8px;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #1a1a1a;
            color: #fff;
        }

        .card {
            border: 1px solid #333;
            border-radius: 12px;
        }

        .card-header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .table-dark {
            background-color: #0a0a0a;
        }

        .table-dark td,
        .table-dark th {
            border-color: #333;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .role-admin {
            background-color: #dc3545;
        }

        .role-director {
            background-color: #fd7e14;
        }

        .role-department_head {
            background-color: #20c997;
        }

        .role-team_leader {
            background-color: #0dcaf0;
            color: #000;
        }

        .role-employee {
            background-color: #6c757d;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
        }

        .stat-card {
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 5px 12px;
            background-color: #1a1a1a;
            border-radius: 20px;
        }

        footer {
            border-top: 1px solid #333;
        }

        .btn-sm {
            margin: 2px;
        }

        .search-input {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 20px;
            padding: 8px 16px;
            width: 100%;
            max-width: 300px;
        }

        .search-input:focus {
            background-color: #2a2a2a;
            color: #fff;
            outline: none;
            border-color: #007bff;
        }
    </style>
</head>

<body>
    <div class="toast-container"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🏢 HRM - Quản lý nhân sự</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <div class="theme-toggle" id="themeToggle">🌙</div>
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                        👤 <span id="userNameDisplay">Đang tải...</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" onclick="showMyProfile()">📋 Hồ sơ của tôi</a></li>
                        <li><a class="dropdown-item" href="#" onclick="showMySalary()">💰 Lương của tôi</a></li>
                        <li><a class="dropdown-item" href="#" onclick="showMyAttendance()">⏱️ Chấm công của tôi</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">🚪 Đăng xuất</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-2">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" onclick="showDashboard()">📊 Dashboard</a></li>
                    <li class="nav-item" id="menuEmployees" style="display: none;"><a class="nav-link"
                            onclick="showEmployees()">👥 Quản lý nhân viên</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showMySalary()">💰 Lương của tôi</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showMyAttendance()">⏱️ Chấm công</a></li>
                    <li class="nav-item" id="menuAdmin" style="display: none;"><a class="nav-link"
                            onclick="showAdminPanel()">⚙️ Quản trị</a></li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <div id="mainContent">
                    <div class="text-center mt-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Đang tải dữ liệu...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-3">
        CopyRight © 2026 Nguyễn Tấn Vĩnh - Lê Đức Trọng
    </footer>

    <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header">
                    <h5 class="modal-title">📋 Hồ sơ cá nhân</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="profileContent">
                    <!-- Nội dung sẽ được JavaScript điền vào -->
                </div>
            </div>
        </div>
    </div>

    <!-- Attendance Modal -->
    <div class="modal fade" id="attendanceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header">
                    <h5 class="modal-title">⏱️ Chấm công</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <button class="btn btn-success w-100 mb-2" onclick="checkIn()">✅ Chấm công VÀO</button>
                    <button class="btn btn-danger w-100" onclick="checkOut()">❌ Chấm công RA</button>
                    <div id="attendanceStatus" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============== GLOBAL ==============
        let currentUser = null;
        let usersList = [];
        let attendanceRecords = JSON.parse(localStorage.getItem('attendance') || '[]');
        let changeHistory = JSON.parse(localStorage.getItem('changeHistory') || '[]');
        let currentSearchTerm = '';

        // ============== UTILITIES ==============
        function showToast(message, type = 'success') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const id = 'toast_' + Date.now();
            const bg = type === 'error' ? 'bg-danger' : (type === 'warning' ? 'bg-warning' : 'bg-success');
            const html = `<div id="${id}" class="toast align-items-center ${bg} text-white border-0 mb-2 show" role="alert"><div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            container.insertAdjacentHTML('beforeend', html);
            setTimeout(() => document.getElementById(id)?.remove(), 3000);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        function getRoleName(role) {
            const names = { admin: 'Admin', director: 'Giám đốc', department_head: 'Trưởng phòng', team_leader: 'Trưởng nhóm', employee: 'Nhân viên' };
            return names[role] || role;
        }

        function addToHistory(action, details) {
            changeHistory.unshift({
                id: Date.now(),
                timestamp: new Date().toISOString(),
                userName: currentUser?.fullName || 'Unknown',
                action: action,
                details: details
            });
            if (changeHistory.length > 100) changeHistory.pop();
            localStorage.setItem('changeHistory', JSON.stringify(changeHistory));
        }

        // ============== AUTH ==============
        async function checkAuth() {
            try {
                // Thử lấy thông tin user từ localStorage (demo mode)
                const savedUser = localStorage.getItem('currentUser');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('userNameDisplay').innerText = currentUser.fullName;

                    const canManageEmployees = ['admin', 'director', 'department_head'].includes(currentUser.role);
                    document.getElementById('menuEmployees').style.display = canManageEmployees ? 'block' : 'none';
                    document.getElementById('menuAdmin').style.display = currentUser.role === 'admin' ? 'block' : 'none';

                    await loadUsers();
                    showDashboard();
                } else {
                    // Nếu chưa đăng nhập, tạo user demo
                    createDemoUser();
                }
            } catch (error) {
                console.error('Auth error:', error);
                createDemoUser();
            }
        }

        function createDemoUser() {
            currentUser = {
                id: 'demo_001',
                _id: 'demo_001',
                fullName: 'Nguyễn Văn A',
                email: 'admin@hrm.com',
                role: 'admin',
                jobType: 'van_phong',
                coefficient: 2.2,
                seniorityYears: 2
            };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('userNameDisplay').innerText = currentUser.fullName;

            document.getElementById('menuEmployees').style.display = 'block';
            document.getElementById('menuAdmin').style.display = 'block';

            loadUsers();
            showDashboard();
            showToast('Đã đăng nhập với tài khoản demo', 'success');
        }

        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            showToast('Đã đăng xuất', 'info');
            setTimeout(() => location.reload(), 1000);
        });

        // ============== LOAD USERS ==============
        async function loadUsers() {
            // Demo data - tạo danh sách nhân viên mẫu
            const savedUsers = localStorage.getItem('usersList');
            if (savedUsers) {
                usersList = JSON.parse(savedUsers);
            } else {
                usersList = [
                    { _id: '1', fullName: 'Nguyễn Văn A', email: 'nguyenvana@hrm.com', role: 'admin', jobType: 'van_phong', coefficient: 2.5, seniorityYears: 5 },
                    { _id: '2', fullName: 'Trần Thị B', email: 'tranthib@hrm.com', role: 'director', jobType: 'van_phong', coefficient: 2.8, seniorityYears: 8 },
                    { _id: '3', fullName: 'Lê Văn C', email: 'levanc@hrm.com', role: 'department_head', jobType: 'van_phong', coefficient: 2.3, seniorityYears: 4 },
                    { _id: '4', fullName: 'Phạm Thị D', email: 'phamthid@hrm.com', role: 'employee', jobType: 'kinh_doanh', coefficient: 2.0, seniorityYears: 1 },
                    { _id: '5', fullName: 'Hoàng Văn E', email: 'hoangvane@hrm.com', role: 'employee', jobType: 'van_phong', coefficient: 1.8, seniorityYears: 0 }
                ];
                localStorage.setItem('usersList', JSON.stringify(usersList));
            }
        }

        // ============== DASHBOARD ==============
        async function showDashboard() {
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="row">
                    <div class="col-md-4 mb-3"><div class="stat-card"><div class="stat-value" id="mySalary">0</div><div>Lương của tôi</div></div></div>
                    <div class="col-md-4 mb-3"><div class="stat-card"><div class="stat-value" id="myAttendance">0</div><div>Chấm công tháng này</div></div></div>
                    <div class="col-md-4 mb-3"><div class="stat-card"><div class="stat-value" id="totalEmployees">0</div><div>Tổng nhân viên</div></div></div>
                </div>
                <div class="card mt-3"><div class="card-header">📋 Hoạt động gần đây</div><div class="card-body" id="recentList"></div></div>
            `;

            document.getElementById('totalEmployees').innerText = usersList.length;

            // Tính lương demo
            const baseSalary = 4500000;
            const seniorityBonus = baseSalary * (currentUser.seniorityYears || 0) * 0.03;
            const totalSalary = baseSalary * (currentUser.coefficient || 1) + seniorityBonus;
            document.getElementById('mySalary').innerHTML = formatCurrency(totalSalary);

            const currentMonth = new Date().getMonth();
            const monthlyAttendance = attendanceRecords.filter(r => r.userId === currentUser.id && new Date(r.date).getMonth() === currentMonth);
            document.getElementById('myAttendance').innerText = monthlyAttendance.length;

            const recent = changeHistory.slice(0, 5);
            document.getElementById('recentList').innerHTML = recent.length ? recent.map(h => `<div class="border-bottom border-secondary pb-2 mb-2">📅 ${new Date(h.timestamp).toLocaleString()} - <strong>${h.userName}</strong> đã ${h.action}</div>`).join('') : '<div class="text-muted">Chưa có hoạt động</div>';
        }

        // ============== MY PROFILE ==============
        function showMyProfile() {
            const content = document.getElementById('profileContent');
            content.innerHTML = `
                <div class="text-center"><div style="font-size: 64px;">👤</div><h4>${currentUser.fullName}</h4><p class="text-muted">${currentUser.email}</p></div>
                <div class="mb-3"><label>Họ tên</label><input type="text" id="profileName" class="form-control bg-dark text-white" value="${currentUser.fullName}"></div>
                <div class="mb-3"><label>Email</label><input type="email" id="profileEmail" class="form-control bg-dark text-white" value="${currentUser.email}"></div>
                <div class="mb-3"><label>Vai trò</label><input type="text" class="form-control bg-dark text-white" value="${getRoleName(currentUser.role)}" disabled></div>
                <div class="mb-3"><label>Loại nhân viên</label>
                    <select id="profileJobType" class="form-select bg-dark text-white">
                        <option value="van_phong" ${currentUser.jobType === 'van_phong' ? 'selected' : ''}>Văn phòng</option>
                        <option value="kinh_doanh" ${currentUser.jobType === 'kinh_doanh' ? 'selected' : ''}>Kinh doanh</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100" onclick="updateProfile()">Cập nhật hồ sơ</button>
            `;
            new bootstrap.Modal(document.getElementById('profileModal')).show();
        }

        function updateProfile() {
            currentUser.fullName = document.getElementById('profileName').value;
            currentUser.email = document.getElementById('profileEmail').value;
            currentUser.jobType = document.getElementById('profileJobType').value;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('userNameDisplay').innerText = currentUser.fullName;
            showToast('Cập nhật hồ sơ thành công');
            bootstrap.Modal.getInstance(document.getElementById('profileModal')).hide();
            addToHistory('cập nhật hồ sơ', { name: currentUser.fullName });
        }

        // ============== MY SALARY ==============
        function showMySalary() {
            const baseSalary = 4500000;
            const seniorityBonus = baseSalary * (currentUser.seniorityYears || 0) * 0.03;
            const salaryByCoefficient = baseSalary * (currentUser.coefficient || 1);
            const totalSalary = salaryByCoefficient + seniorityBonus;

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <h3>💰 Bảng lương của tôi</h3>
                <div class="card">
                    <div class="card-body">
                        <table class="table table-dark">
                            <tr><td>Lương cơ bản</td><td class="text-end">${formatCurrency(baseSalary)}</td></tr>
                            <tr><td>Hệ số lương (${currentUser.coefficient})</td><td class="text-end">${formatCurrency(salaryByCoefficient)}</td></tr>
                            <tr><td>Thâm niên (${currentUser.seniorityYears || 0} năm x 3%)</td><td class="text-end">${formatCurrency(seniorityBonus)}</td></tr>
                            <tr class="table-success"><td><strong>Tổng lương</strong></td><td class="text-end fw-bold">${formatCurrency(totalSalary)}</td></tr>
                        </table>
                        <button class="btn btn-primary mt-2" onclick="requestSalaryAdvance()">💰 Yêu cầu tạm ứng lương</button>
                    </div>
                </div>
            `;
        }

        function requestSalaryAdvance() {
            showToast('Yêu cầu tạm ứng đã được gửi đến quản lý', 'info');
            addToHistory('yêu cầu tạm ứng lương', { amount: 2000000 });
        }

        // ============== ATTENDANCE ==============
        function showMyAttendance() {
            const main = document.getElementById('mainContent');
            const todayStatus = getTodayStatus();
            main.innerHTML = `
                <h3>⏱️ Chấm công</h3>
                <div class="row">
                    <div class="col-md-5 mb-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <div style="font-size: 48px;">${todayStatus.hasCheckedIn ? '✅' : '⏰'}</div>
                                <h5>${todayStatus.hasCheckedIn ? (todayStatus.hasCheckedOut ? 'Đã hoàn thành' : 'Đã chấm công vào') : 'Chưa chấm công'}</h5>
                                ${todayStatus.checkInTime ? `<p>Vào lúc: ${todayStatus.checkInTime}</p>` : ''}
                                ${todayStatus.checkOutTime ? `<p>Ra lúc: ${todayStatus.checkOutTime}</p>` : ''}
                                <div class="mt-3">
                                    <button class="btn btn-success me-2" onclick="openAttendanceModal()" ${todayStatus.hasCheckedIn ? 'disabled' : ''}>✅ Chấm công vào</button>
                                    <button class="btn btn-danger" onclick="checkOut()" ${!todayStatus.hasCheckedIn || todayStatus.hasCheckedOut ? 'disabled' : ''}>❌ Chấm công ra</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="card"><div class="card-header">📅 Lịch sử chấm công (30 ngày gần nhất)</div><div class="card-body" id="attendanceHistoryList"></div></div>
                    </div>
                </div>
            `;
            loadAttendanceHistory();
        }

        function getTodayStatus() {
            const today = new Date().toISOString().split('T')[0];
            const record = attendanceRecords.find(r => r.userId === currentUser.id && r.date === today);
            return {
                hasCheckedIn: !!record?.checkIn,
                hasCheckedOut: !!record?.checkOut,
                checkInTime: record?.checkIn,
                checkOutTime: record?.checkOut
            };
        }

        function openAttendanceModal() {
            document.getElementById('attendanceStatus').innerHTML = '';
            new bootstrap.Modal(document.getElementById('attendanceModal')).show();
        }

        function checkIn() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const existing = attendanceRecords.find(r => r.userId === currentUser.id && r.date === today);

            if (existing?.checkIn) {
                showToast('Bạn đã chấm công vào hôm nay rồi!', 'warning');
                bootstrap.Modal.getInstance(document.getElementById('attendanceModal')).hide();
                return;
            }

            if (existing) {
                existing.checkIn = now.toLocaleTimeString('vi-VN');
            } else {
                attendanceRecords.push({ userId: currentUser.id, date: today, checkIn: now.toLocaleTimeString('vi-VN'), checkOut: null });
            }

            localStorage.setItem('attendance', JSON.stringify(attendanceRecords));
            addToHistory('chấm công vào', { date: today, time: now.toLocaleTimeString('vi-VN') });
            showToast(`Chấm công vào lúc ${now.toLocaleTimeString('vi-VN')} thành công`, 'success');
            bootstrap.Modal.getInstance(document.getElementById('attendanceModal')).hide();
            showMyAttendance();
        }

        function checkOut() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const record = attendanceRecords.find(r => r.userId === currentUser.id && r.date === today);

            if (!record || !record.checkIn) {
                showToast('Bạn chưa chấm công vào hôm nay!', 'warning');
                bootstrap.Modal.getInstance(document.getElementById('attendanceModal')).hide();
                return;
            }
            if (record.checkOut) {
                showToast('Bạn đã chấm công ra rồi!', 'warning');
                bootstrap.Modal.getInstance(document.getElementById('attendanceModal')).hide();
                return;
            }

            record.checkOut = now.toLocaleTimeString('vi-VN');
            localStorage.setItem('attendance', JSON.stringify(attendanceRecords));
            addToHistory('chấm công ra', { date: today, time: now.toLocaleTimeString('vi-VN') });
            showToast(`Chấm công ra lúc ${now.toLocaleTimeString('vi-VN')} thành công`, 'success');
            bootstrap.Modal.getInstance(document.getElementById('attendanceModal')).hide();
            showMyAttendance();
        }

        function loadAttendanceHistory() {
            const historyDiv = document.getElementById('attendanceHistoryList');
            if (!historyDiv) return;

            const userRecords = attendanceRecords.filter(r => r.userId === currentUser.id).slice(0, 30);
            if (userRecords.length === 0) {
                historyDiv.innerHTML = '<div class="text-muted text-center">Chưa có dữ liệu chấm công</div>';
                return;
            }
            historyDiv.innerHTML = userRecords.map(r => `
                <div class="border-bottom border-secondary pb-2 mb-2">
                    <strong>📅 ${r.date}</strong>
                    <div>🕐 Vào: ${r.checkIn || '--'} | 🚪 Ra: ${r.checkOut || '--'}</div>
                </div>
            `).join('');
        }

        // ============== EMPLOYEES MANAGEMENT ==============
        async function showEmployees() {
            if (!['admin', 'director', 'department_head'].includes(currentUser?.role)) {
                showToast('Bạn không có quyền truy cập', 'error');
                showDashboard();
                return;
            }

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h3>👥 Danh sách nhân viên</h3>
                    <div class="d-flex gap-2">
                        <input type="text" id="employeeSearchInput" class="search-input" placeholder="🔍 Tìm theo tên hoặc email ..." value="${currentSearchTerm}">
                        <button class="btn btn-primary" onclick="openUserModal()">➕ Thêm nhân viên</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark">
                        <thead><tr><th>#</th><th>Họ tên</th><th>Email</th><th>Vai trò</th><th>Loại</th><th>Hệ số</th><th>Thao tác</th></tr></thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            `;

            const searchInput = document.getElementById('employeeSearchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    currentSearchTerm = e.target.value;
                    renderFilteredUsers();
                });
            }

            renderFilteredUsers();
        }

        function renderFilteredUsers() {
            const tbody = document.getElementById('usersTable');
            if (!tbody) return;

            const term = currentSearchTerm.trim().toLowerCase();
            let filtered = [...usersList];
            if (term !== '') {
                filtered = usersList.filter(user =>
                    user.fullName.toLowerCase().includes(term) ||
                    user.email.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Không tìm thấy nhân viên nào</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map((u, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${escapeHtml(u.fullName)}</td>
                    <td>${escapeHtml(u.email)}</td>
                    <td><span class="role-badge role-${u.role}">${getRoleName(u.role)}</span></td>
                    <td>${u.jobType === 'kinh_doanh' ? '📈 Kinh doanh' : '📄 Văn phòng'}</td>
                    <td>${u.coefficient}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewSalary('${u._id}')">💰</button>
                        <button class="btn btn-sm btn-warning" onclick="editUser('${u._id}')">✏️</button>
                        ${currentUser?.role === 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u._id}')">🗑️</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function openUserModal(id = null) {
            let modal = document.getElementById('userModal');
            if (!modal) {
                const modalHtml = `
                    <div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content bg-dark text-white">
                        <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nhân viên</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body">
                            <form id="userForm">
                                <input type="hidden" id="userId">
                                <div class="mb-2"><input type="text" id="fullName" class="form-control bg-dark text-white" placeholder="Họ tên"></div>
                                <div class="mb-2"><input type="email" id="email" class="form-control bg-dark text-white" placeholder="Email"></div>
                                <div class="mb-2"><input type="password" id="password" class="form-control bg-dark text-white" placeholder="Mật khẩu"></div>
                                <div class="mb-2"><select id="role" class="form-select bg-dark text-white"><option value="employee">Nhân viên</option><option value="team_leader">Trưởng nhóm</option><option value="department_head">Trưởng phòng</option><option value="director">Giám đốc</option><option value="admin">Admin</option></select></div>
                                <div class="mb-2"><select id="jobType" class="form-select bg-dark text-white"><option value="van_phong">Văn phòng</option><option value="kinh_doanh">Kinh doanh</option></select></div>
                                <div class="mb-2"><input type="number" id="coefficient" class="form-control bg-dark text-white" placeholder="Hệ số" value="2.2" step="0.1"></div>
                                <div class="mb-2"><input type="number" id="seniorityYears" class="form-control bg-dark text-white" placeholder="Năm KN" value="0"></div>
                            </form>
                        </div>
                        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" onclick="saveUser()">Lưu</button></div>
                    </div></div></div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                modal = document.getElementById('userModal');
            }

            if (id) {
                const u = usersList.find(x => x._id === id);
                if (u) {
                    document.getElementById('userId').value = u._id;
                    document.getElementById('fullName').value = u.fullName;
                    document.getElementById('email').value = u.email;
                    document.getElementById('role').value = u.role;
                    document.getElementById('jobType').value = u.jobType;
                    document.getElementById('coefficient').value = u.coefficient;
                    document.getElementById('seniorityYears').value = u.seniorityYears;
                    document.getElementById('modalTitle').innerText = 'Sửa nhân viên';
                }
            } else {
                document.getElementById('userForm')?.reset();
                document.getElementById('userId').value = '';
                document.getElementById('modalTitle').innerText = 'Thêm nhân viên';
            }
            new bootstrap.Modal(modal).show();
        }

        function editUser(id) { openUserModal(id); }

        function saveUser() {
            const userId = document.getElementById('userId').value;
            const data = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                jobType: document.getElementById('jobType').value,
                coefficient: parseFloat(document.getElementById('coefficient').value),
                seniorityYears: parseFloat(document.getElementById('seniorityYears').value)
            };

            if (userId) {
                const index = usersList.findIndex(u => u._id === userId);
                if (index !== -1) {
                    usersList[index] = { ...usersList[index], ...data };
                    showToast('Cập nhật thành công');
                    addToHistory('cập nhật nhân viên', data);
                }
            } else {
                const newId = Date.now().toString();
                usersList.push({ _id: newId, ...data });
                showToast('Thêm nhân viên thành công');
                addToHistory('thêm nhân viên', data);
            }

            localStorage.setItem('usersList', JSON.stringify(usersList));
            bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
            showEmployees();
        }

        function deleteUser(id) {
            if (!confirm('Xóa nhân viên này?')) return;
            usersList = usersList.filter(u => u._id !== id);
            localStorage.setItem('usersList', JSON.stringify(usersList));
            showToast('Xóa thành công');
            addToHistory('xóa nhân viên', { id });
            showEmployees();
        }

        function viewSalary(userId) {
            const user = usersList.find(u => u._id === userId);
            if (user) {
                const baseSalary = 4500000;
                const seniorityBonus = baseSalary * (user.seniorityYears || 0) * 0.03;
                const total = baseSalary * (user.coefficient || 1) + seniorityBonus;
                showToast(`Lương của ${user.fullName}: ${formatCurrency(total)}`, 'info');
            }
        }

        // ============== ADMIN PANEL ==============
        function showAdminPanel() {
            if (currentUser?.role !== 'admin') {
                showToast('Bạn không có quyền truy cập', 'error');
                showDashboard();
                return;
            }
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <h3>⚙️ Quản trị hệ thống</h3>
                <div class="row">
                    <div class="col-md-6 mb-3"><div class="card"><div class="card-header">📊 Thống kê</div><div class="card-body"><p>Tổng nhân viên: ${usersList.length}</p><p>Lịch sử thay đổi: ${changeHistory.length}</p></div></div></div>
                    <div class="col-md-6 mb-3"><div class="card"><div class="card-header">🛡️ Bảo mật</div><div class="card-body"><p>✅ Chống SQL/NoSQL Injection</p><p>✅ XSS Protection</p><p>✅ Session HTTPOnly</p></div></div></div>
                </div>
                <button class="btn btn-warning" onclick="clearHistory()">🗑️ Xóa lịch sử</button>
            `;
        }

        function clearHistory() {
            if (confirm('Xóa toàn bộ lịch sử?')) {
                changeHistory = [];
                localStorage.setItem('changeHistory', '[]');
                showToast('Đã xóa lịch sử', 'success');
                showAdminPanel();
            }
        }

        // ============== THEME ==============
        let isDark = true;
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            isDark = !isDark;
            document.body.style.backgroundColor = isDark ? '#000' : '#f0f0f0';
            document.body.style.color = isDark ? '#fff' : '#000';
            document.getElementById('themeToggle').innerHTML = isDark ? '🌙' : '☀️';
        });

        // ============== INIT ==============
        checkAuth();
    </script>
</body>

</html>
