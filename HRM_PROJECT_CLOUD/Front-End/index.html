<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Login - Quản lý nhân sự</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 1px solid #333;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .form-control {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: white;
        }
        
        .form-control:focus {
            background-color: #1a1a1a;
            border-color: #007bff;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        
        .btn-login {
            background-color: #007bff;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
        }
        
        .toast {
            background-color: #1a1a1a;
            border: 1px solid #333;
        }
        
        .demo-info {
            background-color: #0a0a0a;
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="toast-container"></div>
    
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="col-md-4">
            <div class="login-card p-4">
                <div class="text-center mb-4">
                    <div style="font-size: 64px;">🏢</div>
                    <h2 class="mt-2">HRM System</h2>
                    <p class="text-muted">Quản lý nhân sự chuyên nghiệp</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="admin@hrm.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-login w-100 text-white">Đăng nhập</button>
                </form>
                
               
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============== TOAST NOTIFICATION ==============
        function showToast(message, type = 'success') {
            let toastContainer = document.querySelector('.toast-container');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.className = 'toast-container';
                document.body.appendChild(toastContainer);
            }
            
            const toastId = 'toast_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            let bgClass = 'bg-success';
            if (type === 'error') bgClass = 'bg-danger';
            if (type === 'warning') bgClass = 'bg-warning';
            if (type === 'info') bgClass = 'bg-info';
            
            const textClass = type === 'warning' ? 'text-dark' : 'text-white';
            
            const toastHtml = `
                <div id="${toastId}" class="toast align-items-center ${bgClass} ${textClass} border-0 mb-2 show" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            
            toastContainer.insertAdjacentHTML('beforeend', toastHtml);
            const toastElement = document.getElementById(toastId);
            
            setTimeout(() => {
                if (toastElement) toastElement.remove();
            }, 3000);
        }
        
        // ============== LOGIN HANDLER ==============
        async function handleLogin(email, password) {
            if (!email || !password) {
                showToast('Vui lòng nhập đầy đủ email và mật khẩu', 'warning');
                return false;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirectUrl || '/home.html';
                    }, 500);
                    return true;
                } else {
                    showToast(data.message || 'Đăng nhập thất bại. Sai email hoặc mật khẩu', 'error');
                    return false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('Lỗi kết nối server. Vui lòng thử lại sau', 'error');
                return false;
            }
        }
        
        // ============== FORM SUBMIT ==============
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            await handleLogin(email, password);
        });
        
        // Auto fill demo admin
        console.log('🔐 Trang đăng nhập HRM đã sẵn sàng');
    </script>
</body>
</html>
